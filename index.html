<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Kitty & Friends — Card Tracker</title>
  <style>
    :root {
      --pink:       #f72585;
      --pink-light: #ffd6e7;
      --pink-mid:   #ff85b3;
      --bg:         #fff5f8;
      --surface:    #ffffff;
      --border:     #ffc2d8;
      --text:       #3a1a2e;
      --muted:      #9e7a8c;
      --green:      #06d6a0;
      --radius:     8px;
      --card-w:     72px;
      --card-h:     118px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #f72585 0%, #b5179e 55%, #7209b7 100%);
      color: white;
      padding: 16px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 16px rgba(183,9,126,.4);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: clamp(1rem, 3.5vw, 1.4rem); font-weight: 900; letter-spacing: -.4px; }
    .progress-wrap {
      background: rgba(255,255,255,.25);
      border-radius: 999px;
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      flex: 1;
      min-width: 100px;
    }
    .progress-bar { height: 100%; background: var(--green); border-radius: 999px; transition: width .4s ease; }
    .progress-label { font-size: .78rem; opacity: .9; margin-top: 5px; font-weight: 600; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 84px;
      z-index: 150;
      align-items: center;
    }
    .btn {
      padding: 5px 13px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--pink); color: var(--pink); }
    .btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .btn-reset { border-color: #ffb3c6; color: #c9184a; margin-left: auto; }
    .btn-reset:hover { background: #c9184a; color: white; border-color: #c9184a; }
    .count-label { font-size: .75rem; color: var(--muted); font-weight: 600; }

    /* ── Panels ── */
    .panels { padding: 12px; display: flex; flex-direction: column; gap: 16px; }

    .panel {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .panel-title {
      background: linear-gradient(90deg, #ffd6e7, #f8e1ff);
      padding: 6px 14px;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--pink);
      border-bottom: 1px solid var(--border);
    }
    .panel-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 12px 12px;
    }
    .panel-row {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      min-width: max-content;
    }

    /* Divider between left and right halves */
    .half-divider {
      width: 2px;
      background: var(--border);
      border-radius: 2px;
      align-self: stretch;
      margin: 0 6px;
      flex-shrink: 0;
    }

    /* ── Section column ── */
    .sec-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .sec-name {
      font-size: .62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      text-align: center;
      max-width: calc(var(--card-w) * 3 + 8px);
    }
    .sec-badge {
      font-size: .58rem;
      background: var(--pink-light);
      color: var(--pink);
      padding: 1px 7px;
      border-radius: 999px;
      font-weight: 700;
    }
    .sec-header { display: flex; flex-direction: column; align-items: center; gap: 3px; }

    /* ── 3×3 card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--card-w));
      grid-template-rows: repeat(3, var(--card-h));
      gap: 4px;
    }
    /* Last section in lower panel may have fewer than 9 cards */
    .card-grid.partial {
      grid-template-rows: repeat(3, var(--card-h));
    }

    /* ── Card tile ── */
    .card-tile {
      width: var(--card-w);
      height: var(--card-h);
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: #fafafa;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .14s, border-color .14s, box-shadow .14s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
    }
    .card-tile:hover {
      border-color: var(--pink-mid);
      transform: scale(1.07);
      box-shadow: 0 4px 14px rgba(247,37,133,.25);
      z-index: 10;
    }
    .card-tile:active { transform: scale(.95); }

    .card-tile img {
      width: 100%;
      flex: 1;
      object-fit: cover;
      object-position: center top;
      display: block;
      pointer-events: none;
    }
    .card-num {
      font-size: .6rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
      padding: 2px 0 3px;
      line-height: 1;
      background: white;
      border-top: 1px solid var(--border);
    }

    /* Collected */
    .card-tile.collected {
      border-color: var(--pink);
      box-shadow: 0 0 0 2px rgba(247,37,133,.2);
    }
    .card-tile.collected img { filter: brightness(.82) saturate(1.1); }
    .card-tile.collected .card-num { color: var(--pink); background: var(--pink-light); }
    .card-tile.collected::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(247,37,133,.18);
      pointer-events: none;
      border-radius: calc(var(--radius) - 2px);
    }
    .card-tile.collected::before {
      content: "✓";
      position: absolute;
      top: 4px;
      right: 5px;
      width: 16px;
      height: 16px;
      background: var(--pink);
      color: white;
      border-radius: 50%;
      font-size: .6rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      line-height: 16px;
      text-align: center;
    }

    /* Empty slot (for partial sections) */
    .card-tile.empty {
      visibility: hidden;
      pointer-events: none;
      border-color: transparent;
    }

    /* Hidden for filter */
    .card-tile.filtered { opacity: .12; pointer-events: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #3a1a2e;
      color: white;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      transition: transform .28s ease;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    footer { text-align: center; padding: 20px 16px; font-size: .7rem; color: var(--muted); }

    /* Scroll hint on mobile */
    @media (max-width: 700px) {
      .panel-scroll::after {
        content: "← scroll →";
        display: block;
        text-align: center;
        font-size: .62rem;
        color: var(--muted);
        padding-top: 6px;
        opacity: .7;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Hello Kitty &amp; Friends — Card Tracker</h1>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 209 collected</div>
</header>

<div class="controls">
  <button class="btn active" data-filter="all">All</button>
  <button class="btn" data-filter="collected">Collected</button>
  <button class="btn" data-filter="needed">Needed</button>
  <span class="count-label" id="countLabel">0/209</span>
  <button class="btn btn-reset" id="btnReset">Reset all</button>
</div>

<div class="panels" id="panels"></div>

<footer>Tap any card to mark as collected &bull; Saved in your browser &bull; 209 cards total</footer>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const PANELS = [
  {
    label: "Base &amp; Rainbow — Characters / Scenes",
    left: [
      { name: "Hello Kitty",             type: "Base",          start: 1   },
      { name: "My Melody",               type: "Base",          start: 10  },
      { name: "Kuromi",                  type: "Base",          start: 19  },
      { name: "Best Friends",            type: "Rainbow",       start: 28  },
    ],
    right: [
      { name: "Play Together",           type: "Glitter",       start: 109 },
      { name: "Kawaii Gashapon",         type: "Crystal Shine", start: 118 },
      { name: "Pop Party",               type: "Crystal Shine", start: 127 },
      { name: "Balloon Parade",          type: "Crystal Shine", start: 136 },
    ],
  },
  {
    label: "Base &amp; Rainbow — Adventures",
    left: [
      { name: "Room Tour",               type: "Base",          start: 37  },
      { name: "Let's Dance!",            type: "Base",          start: 46  },
      { name: "Travel and Fun",          type: "Base",          start: 55  },
      { name: "Road Trip",               type: "Rainbow",       start: 64  },
    ],
    right: [
      { name: "Babies",                  type: "Base",          start: 145 },
      { name: "My Favourite Day",        type: "Crystal Shine", start: 154 },
      { name: "Make-Up",                 type: "Crystal Shine", start: 163 },
      { name: "Unicorn Dreams",          type: "Golden Glitter",start: 172 },
    ],
  },
  {
    label: "Base — Ocean &amp; Space · Golden Glitter",
    left: [
      { name: "At the Seaside",          type: "Base",          start: 73  },
      { name: "Nautical Cuties",         type: "Base",          start: 82  },
      { name: "Space Friends",           type: "Base",          start: 91  },
      { name: "Golden Glitter Friends",  type: "Golden Glitter",start: 100 },
    ],
    right: [
      { name: "Babies (cont.)",          type: "Base",          start: 181 },
      { name: "Cotton Candy Crew",       type: "Golden Glitter",start: 190 },
      { name: "Cotton Candy Crew",       type: "Golden Glitter",start: 199 },
      { name: "Unicorn Dreams",          type: "Golden Glitter",start: 208 },
    ],
  },
];

const TYPE_COLOR = {
  "Base":           "#e2e8f0",
  "Rainbow":        "#fce7f3",
  "Glitter":        "#dbeafe",
  "Crystal Shine":  "#fef9c3",
  "Golden Glitter": "#fef3c7",
};

const STORAGE_KEY = "hkf_v2";
let collected = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
let currentFilter = "all";

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...collected])); }

// ── Build DOM ─────────────────────────────────────────────────────────────
function buildPanels() {
  const container = document.getElementById("panels");
  container.innerHTML = "";

  for (const panel of PANELS) {
    const panelEl = document.createElement("div");
    panelEl.className = "panel";
    panelEl.innerHTML = `<div class="panel-title">${panel.label}</div>
      <div class="panel-scroll"><div class="panel-row" id="row-${PANELS.indexOf(panel)}"></div></div>`;
    container.appendChild(panelEl);

    const row = panelEl.querySelector(".panel-row");

    // Left half
    for (const sec of panel.left) renderSection(row, sec);

    // Divider
    const div = document.createElement("div");
    div.className = "half-divider";
    row.appendChild(div);

    // Right half
    for (const sec of panel.right) renderSection(row, sec);
  }
}

function renderSection(row, sec) {
  const col = document.createElement("div");
  col.className = "sec-col";
  col.dataset.secStart = sec.start;

  const secCards = [];
  for (let i = 0; i < 9; i++) {
    const n = sec.start + i;
    if (n <= 209) secCards.push(n);
  }
  const total = secCards.length;
  const done = secCards.filter(n => collected.has(n)).length;
  const color = TYPE_COLOR[sec.type] || "#f3e8ff";

  col.innerHTML = `
    <div class="sec-header">
      <div class="sec-name">${sec.name}</div>
      <div class="sec-badge" style="background:${color};color:#5a3a6e;"
           id="badge-${sec.start}">${done}/${total}</div>
    </div>
    <div class="card-grid${total < 9 ? ' partial' : ''}" id="grid-${sec.start}"></div>`;

  row.appendChild(col);

  const grid = col.querySelector(".card-grid");

  for (let i = 0; i < 9; i++) {
    const n = sec.start + i;
    const tile = document.createElement("div");

    if (n > 209) {
      tile.className = "card-tile empty";
      grid.appendChild(tile);
      continue;
    }

    tile.className = "card-tile" + (collected.has(n) ? " collected" : "");
    tile.dataset.card = n;
    tile.dataset.sec = sec.start;
    applyFilterClass(tile, n);

    const img = document.createElement("img");
    img.src = `cards/card_${String(n).padStart(3,"0")}.jpg`;
    img.alt = `Card ${n}`;
    img.loading = "lazy";
    img.decoding = "async";

    const num = document.createElement("div");
    num.className = "card-num";
    num.textContent = n;

    tile.appendChild(img);
    tile.appendChild(num);

    tile.addEventListener("click", () => {
      if (collected.has(n)) { collected.delete(n); tile.classList.remove("collected"); }
      else                   { collected.add(n);    tile.classList.add("collected"); }
      save();
      applyFilterClass(tile, n);
      updateStats();
      showToast(collected.has(n) ? `#${n} collected!` : `#${n} removed`);
    });

    grid.appendChild(tile);
  }
}

function applyFilterClass(tile, n) {
  const filtered =
    (currentFilter === "collected" && !collected.has(n)) ||
    (currentFilter === "needed"    &&  collected.has(n));
  tile.classList.toggle("filtered", filtered);
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats() {
  const n = collected.size;
  const pct = (n / 209 * 100).toFixed(1);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `${n} / 209 collected (${pct}%)`;
  document.getElementById("countLabel").textContent = `${n}/209`;

  // Update section badges
  for (const panel of PANELS) {
    for (const sec of [...panel.left, ...panel.right]) {
      const badge = document.getElementById(`badge-${sec.start}`);
      if (!badge) continue;
      const cards = Array.from({length:9}, (_,i) => sec.start+i).filter(c => c<=209);
      const done = cards.filter(c => collected.has(c)).length;
      badge.textContent = `${done}/${cards.length}`;
    }
  }
}

// ── Filters ───────────────────────────────────────────────────────────────
document.querySelectorAll("[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".card-tile:not(.empty)").forEach(tile => {
      applyFilterClass(tile, +tile.dataset.card);
    });
  });
});

// ── Reset ─────────────────────────────────────────────────────────────────
document.getElementById("btnReset").addEventListener("click", () => {
  if (!confirm("Reset all collected cards? Cannot be undone.")) return;
  collected.clear();
  save();
  document.querySelectorAll(".card-tile.collected").forEach(t => t.classList.remove("collected"));
  document.querySelectorAll(".card-tile:not(.empty)").forEach(t => applyFilterClass(t, +t.dataset.card));
  updateStats();
  showToast("All cards reset");
});

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1700);
}

// ── Init ──────────────────────────────────────────────────────────────────
buildPanels();
updateStats();
</script>
</body>
</html>
