<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Kitty & Friends — Card Tracker</title>
  <style>
    :root {
      --pink:       #f72585;
      --pink-light: #ffd6e7;
      --pink-mid:   #ff85b3;
      --bg:         #fff5f8;
      --surface:    #ffffff;
      --border:     #ffc2d8;
      --text:       #3a1a2e;
      --muted:      #9e7a8c;
      --green:      #06d6a0;
      --radius:     8px;
      --card-w:     72px;
      --card-h:     118px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #f72585 0%, #b5179e 55%, #7209b7 100%);
      color: white;
      padding: 16px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 16px rgba(183,9,126,.4);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: clamp(1rem, 3.5vw, 1.4rem); font-weight: 900; letter-spacing: -.4px; }
    .progress-wrap {
      background: rgba(255,255,255,.25);
      border-radius: 999px;
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-bar { height: 100%; background: var(--green); border-radius: 999px; transition: width .4s ease; }
    .progress-label { font-size: .78rem; opacity: .9; margin-top: 5px; font-weight: 600; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 78px;
      z-index: 150;
      align-items: center;
    }
    .btn {
      padding: 5px 13px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--pink); color: var(--pink); }
    .btn.active { background: var(--pink); color: white; border-color: var(--pink); }
    .btn-reset { border-color: #ffb3c6; color: #c9184a; margin-left: auto; }
    .btn-reset:hover { background: #c9184a; color: white; border-color: #c9184a; }
    .count-label { font-size: .75rem; color: var(--muted); font-weight: 600; }

    /* ── Sections container ── */
    .sections {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      padding: 20px 16px;
      justify-content: center;
    }

    /* ── Section card ── */
    .sec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .sec-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }
    .sec-name {
      font-size: .65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      text-align: center;
    }
    .sec-badge {
      font-size: .58rem;
      background: var(--pink-light);
      color: var(--pink);
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    /* Row of grids inside a section (for large sections like Cotton Candy Crew) */
    .sec-grids {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    /* ── 3×3 card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--card-w));
      grid-template-rows: repeat(3, var(--card-h));
      gap: 4px;
    }

    /* ── Card tile ── */
    .card-tile {
      width: var(--card-w);
      height: var(--card-h);
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: #fafafa;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .14s, border-color .14s, box-shadow .14s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
    }
    .card-tile:hover {
      border-color: var(--pink-mid);
      transform: scale(1.07);
      box-shadow: 0 4px 14px rgba(247,37,133,.25);
      z-index: 10;
    }
    .card-tile:active { transform: scale(.95); }

    .card-tile img {
      width: 100%;
      flex: 1;
      object-fit: cover;
      object-position: center top;
      display: block;
      pointer-events: none;
    }
    .card-num {
      font-size: .6rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
      padding: 2px 0 3px;
      line-height: 1;
      background: white;
      border-top: 1px solid var(--border);
    }

    /* Skeleton (empty placeholder) */
    .card-tile.skeleton {
      border: 2px dashed var(--border);
      background: #fdf0f5;
      cursor: default;
      pointer-events: none;
    }

    /* Collected */
    .card-tile.collected {
      border-color: var(--pink);
      box-shadow: 0 0 0 2px rgba(247,37,133,.2);
    }
    .card-tile.collected img { filter: brightness(.82) saturate(1.1); }
    .card-tile.collected .card-num { color: var(--pink); background: var(--pink-light); }
    .card-tile.collected::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(247,37,133,.18);
      pointer-events: none;
      border-radius: calc(var(--radius) - 2px);
    }
    .card-tile.collected::before {
      content: "✓";
      position: absolute;
      top: 4px;
      right: 5px;
      width: 16px;
      height: 16px;
      background: var(--pink);
      color: white;
      border-radius: 50%;
      font-size: .6rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      line-height: 16px;
      text-align: center;
    }

    /* Hidden for filter */
    .card-tile.filtered { opacity: .12; pointer-events: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #3a1a2e;
      color: white;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      transition: transform .28s ease;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    footer { text-align: center; padding: 20px 16px; font-size: .7rem; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Hello Kitty &amp; Friends — Card Tracker</h1>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 209 collected</div>
</header>

<div class="controls">
  <button class="btn active" data-filter="all">All</button>
  <button class="btn" data-filter="collected">Collected</button>
  <button class="btn" data-filter="needed">Needed</button>
  <span class="count-label" id="countLabel">0/209</span>
  <button class="btn btn-reset" id="btnReset">Reset all</button>
</div>

<div class="sections" id="sections"></div>

<footer>Tap any card to mark as collected &bull; Saved in your browser &bull; 209 cards total</footer>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const SECTIONS = [
  { name: "Hello Kitty",            start: 1,   count: 9  },
  { name: "My Melody",              start: 10,  count: 9  },
  { name: "Kuromi",                 start: 19,  count: 9  },
  { name: "Best Friends",           start: 28,  count: 9  },
  { name: "Room Tour",              start: 37,  count: 9  },
  { name: "Let's Dance!",           start: 46,  count: 9  },
  { name: "Travel And Fun",         start: 55,  count: 9  },
  { name: "Road Trip",              start: 64,  count: 9  },
  { name: "At The Seaside",         start: 73,  count: 9  },
  { name: "Nautical Cuties",        start: 82,  count: 9  },
  { name: "Space Friends",          start: 91,  count: 9  },
  { name: "Golden Glitter Friends", start: 100, count: 9  },
  { name: "Play Together",          start: 109, count: 9  },
  { name: "Kawaii Gashapon",        start: 118, count: 9  },
  { name: "Pop Party",              start: 127, count: 9  },
  { name: "Balloon Parade",         start: 136, count: 9  },
  { name: "Babies",                 start: 145, count: 9  },
  { name: "My Favourite Day",       start: 154, count: 9  },
  { name: "Make-up",                start: 163, count: 9  },
  { name: "Unicorn Dreams",         start: 172, count: 9  },
  { name: "Cotton Candy Crew",      start: 181, count: 29 },
];

const STORAGE_KEY = "hkf_v2";
let collected = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
let currentFilter = "all";

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...collected])); }

// ── Build DOM ─────────────────────────────────────────────────────────────
function buildSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";

  for (const sec of SECTIONS) {
    const card = document.createElement("div");
    card.className = "sec-card";

    const done = Array.from({length: sec.count}, (_, i) => sec.start + i)
                      .filter(n => collected.has(n)).length;

    card.innerHTML = `
      <div class="sec-header">
        <div class="sec-name">${sec.name}</div>
        <div class="sec-badge" id="badge-${sec.start}">${done}/${sec.count}</div>
      </div>
      <div class="sec-grids" id="grids-${sec.start}"></div>`;

    container.appendChild(card);

    const gridsRow = card.querySelector(`#grids-${sec.start}`);

    // Split cards into chunks of 9, padding last chunk with skeletons
    const numGrids = Math.ceil(sec.count / 9);
    for (let g = 0; g < numGrids; g++) {
      const grid = document.createElement("div");
      grid.className = "card-grid";
      gridsRow.appendChild(grid);

      for (let i = 0; i < 9; i++) {
        const cardIdx = g * 9 + i;
        const tile = document.createElement("div");

        if (cardIdx >= sec.count) {
          // Skeleton placeholder
          tile.className = "card-tile skeleton";
          grid.appendChild(tile);
          continue;
        }

        const n = sec.start + cardIdx;
        tile.className = "card-tile" + (collected.has(n) ? " collected" : "");
        tile.dataset.card = n;
        applyFilterClass(tile, n);

        const img = document.createElement("img");
        img.src = `cards/card_${String(n).padStart(3,"0")}.jpg`;
        img.alt = `Card ${n}`;
        img.loading = "lazy";
        img.decoding = "async";

        const num = document.createElement("div");
        num.className = "card-num";
        num.textContent = n;

        tile.appendChild(img);
        tile.appendChild(num);

        tile.addEventListener("click", () => {
          if (collected.has(n)) { collected.delete(n); tile.classList.remove("collected"); }
          else                   { collected.add(n);    tile.classList.add("collected"); }
          save();
          applyFilterClass(tile, n);
          updateStats();
          showToast(collected.has(n) ? `#${n} collected!` : `#${n} removed`);
        });

        grid.appendChild(tile);
      }
    }
  }
}

function applyFilterClass(tile, n) {
  const filtered =
    (currentFilter === "collected" && !collected.has(n)) ||
    (currentFilter === "needed"    &&  collected.has(n));
  tile.classList.toggle("filtered", filtered);
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats() {
  const n = collected.size;
  const pct = (n / 209 * 100).toFixed(1);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `${n} / 209 collected (${pct}%)`;
  document.getElementById("countLabel").textContent = `${n}/209`;

  for (const sec of SECTIONS) {
    const badge = document.getElementById(`badge-${sec.start}`);
    if (!badge) continue;
    const done = Array.from({length: sec.count}, (_, i) => sec.start + i)
                      .filter(c => collected.has(c)).length;
    badge.textContent = `${done}/${sec.count}`;
  }
}

// ── Filters ───────────────────────────────────────────────────────────────
document.querySelectorAll("[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".card-tile:not(.skeleton)").forEach(tile => {
      applyFilterClass(tile, +tile.dataset.card);
    });
  });
});

// ── Reset ─────────────────────────────────────────────────────────────────
document.getElementById("btnReset").addEventListener("click", () => {
  if (!confirm("Reset all collected cards? Cannot be undone.")) return;
  collected.clear();
  save();
  document.querySelectorAll(".card-tile.collected").forEach(t => t.classList.remove("collected"));
  document.querySelectorAll(".card-tile:not(.skeleton)").forEach(t => applyFilterClass(t, +t.dataset.card));
  updateStats();
  showToast("All cards reset");
});

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1700);
}

// ── Init ──────────────────────────────────────────────────────────────────
buildSections();
updateStats();
</script>
</body>
</html>
